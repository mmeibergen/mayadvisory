<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">may advisory</title>
  <desc id="desc">see clearly \ act decisively</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061411" />
      <stop offset="55%" stop-color="#0A1F1D" />
      <stop offset="100%" stop-color="#143330" />
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="12%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06" />
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.28" />

  <g fill="#F5F2EC" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="600" y="280" font-size="86" letter-spacing="-1">may</text>
    <text x="600" y="372" font-size="168" fill="#D8662E">\</text>
    <text x="600" y="458" font-size="86" font-weight="700" letter-spacing="-1">advisory</text>
    <text x="600" y="546" font-size="34" fill="#C6D1CE" font-style="italic">see clearly \ act decisively</text>
  </g>
</svg>
